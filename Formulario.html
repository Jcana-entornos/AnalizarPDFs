<!DOCTYPE html>
<html>
<head>
    <title>Subir PDF</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4fdf6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 128, 0, 0.15);
            text-align: center;
            width: 320px;
        }

        h2 {
            color: #1b5e20;
            margin-bottom: 20px;
        }

        input[type="file"] {
            border: 2px dashed #2e7d32;
            padding: 15px;
            width: 100%;
            border-radius: 8px;
            background: #f9fff9;
            cursor: pointer;
        }

        button {
            margin-top: 20px;
            background: #2e7d32;
            color: white;
            border: none;
            padding: 12px 20px;
            width: 100%;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #1b5e20;
        }

        .container:hover {
            transform: translateY(-2px);
            transition: 0.3s;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Subir archivo PDF</h2>

    <form action="codigo.php" method="post" enctype="multipart/form-data">
        <input type="file" name="pdf" required>
        <button type="submit">Analizar</button>
    </form>
</div>

</body>
</html>
